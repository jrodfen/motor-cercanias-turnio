name: Actualizador Nocturno Cercanias

on:
  schedule:
    - cron: '0 3 * * *' # Todos los días a las 03:00 AM
  workflow_dispatch: # Botón manual

permissions:
  contents: write # Permiso para que el bot guarde el archivo

jobs:
  procesar-mallas:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar herramientas
        run: npm install

      - name: Ejecutar Motor
        run: npm start

      - name: Guardar nuevo JSON en GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cercanias_optimizado.json
          git commit -m "Actualización automática Cercanías" || echo "No hay cambios nuevos"
          git push
